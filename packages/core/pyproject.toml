[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "reprompt-core"
version = "0.0.1"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
    "sentence-transformers>=3.0",
    "litellm>=1.63",
    "optuna>=3.6",
]

[project.optional-dependencies]
dev = [
    "pytest",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
